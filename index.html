  <script>

const APP_VERSION='1.0.0',SCHEMA_VERSION='1.0.0',RELEASE_DATE='2026-07-08';

// --- UTILITY ---
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,9)}
function $(id){return document.getElementById(id)}
function qs(s,el){return(el||document).querySelector(s)}
function qsa(s,el){return(el||document).querySelectorAll(s)}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function formatDate(d){return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}

// --- STORAGE ---
function loadData(key,def){try{const d=localStorage.getItem('petmat_'+key);return d?JSON.parse(d):def}catch(e){return def}}
function saveData(key,val){try{localStorage.setItem('petmat_'+key,JSON.stringify(val))}catch(e){console.error('Storage full')}}

// --- STATE ---
let state={
profiles:loadData('profiles',[]),
classes:loadData('classes',[]),
quizResults:loadData('quizResults',[]),
exerciseResults:loadData('exerciseResults',[]),
teacherNotes:loadData('teacherNotes',[]),
backupHistory:loadData('backupHistory',[]),
settings:loadData('settings',{pinHash:null,ketuntasan:70,lastBackup:null,onboardingDone:false,studentMode:false,demoMode:false,currentProfile:null,guruSessionStart:null}),
};
function persist(){
saveData('profiles',state.profiles);
saveData('classes',state.classes);
saveData('quizResults',state.quizResults);
saveData('exerciseResults',state.exerciseResults);
saveData('teacherNotes',state.teacherNotes);
saveData('backupHistory',state.backupHistory);
saveData('settings',state.settings);
}

// --- PIN HASHING ---
async function hashPin(pin){
if(window.crypto&&window.crypto.subtle){
const enc=new TextEncoder().encode(pin+'petmat_salt');
const hash=await crypto.subtle.digest('SHA-256',enc);
return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
return btoa(pin+'_fallback');
}

// --- GURU SESSION ---
let guruUnlocked=false,guruTimer=null;
function startGuruSession(){guruUnlocked=true;resetGuruTimer();renderSidebar();navigateTo(currentView)}
function resetGuruTimer(){clearTimeout(guruTimer);guruTimer=setTimeout(()=>{guruUnlocked=false;state.settings.studentMode=true;persist();renderSidebar();navigateTo('beranda')},30*60*1000)}
function lockGuru(){guruUnlocked=false;clearTimeout(guruTimer);state.settings.studentMode=true;persist();renderSidebar();navigateTo('beranda')}

// --- PIN MODAL ---
let pinCallback=null;
function showPinModal(cb){pinCallback=cb;$('pinModal').style.display='block';$('pinOverlay').style.display='block';$('pinInput').value='';$('pinError').style.display='none';$('pinInput').focus()}
function closePinModal(){$('pinModal').style.display='none';$('pinOverlay').style.display='none';pinCallback=null}
async function verifyPin(){
const pin=$('pinInput').value;
if(!pin){$('pinError').style.display='block';return}
const h=await hashPin(pin);
if(!state.settings.pinHash){
// First time - set PIN
state.settings.pinHash=h;persist();closePinModal();if(pinCallback)pinCallback();
}else if(h===state.settings.pinHash){
closePinModal();if(pinCallback)pinCallback();
}else{$('pinError').style.display='block';$('pinError').textContent='PIN salah. Coba lagi.'}
}

{id:'beranda',icon:'home',label:'Beranda',student:true},

{id:'dashboard',icon:'layout-dashboard',label:'Dashboard Guru',student:false},
{id:'presentasi',icon:'monitor',label:'Mode Presentasi',student:false},

{id:'backup',icon:'database',label:'Pusat Backup',student:false},
{id:'laporan',icon:'printer',label:'Laporan',student:false},
{id:'papan-tulis',icon:'pen-tool',label:'Papan Tulis',student:true},
{id:'panduan',icon:'help-circle',label:'Panduan',student:true},
{id:'pengaturan',icon:'settings',label:'Pengaturan',student:false},
{id:'privasi',icon:'shield',label:'Privasi Data',student:true},
{id:'versi',icon:'info',label:'Info Versi',student:true},

function renderSidebar(){
const menu=$('sidebarMenu');
const isStudent=state.settings.studentMode&&!guruUnlocked;

MENU_ITEMS.forEach(item=>{
if(isStudent&&!item.student)return;
html+=`<div class="sidebar-item ${currentView===item.id?'active':''}" onclick="navigateTo('${item.id}')"><i data-lucide="${item.icon}" style="width:18px;height:18px"></i><span>${item.label}</span></div>`;

if(isStudent){

}

// Update profile name

// --- MATERI DATA ---
const MATERI=[
{id:'bilangan',title:'Bilangan hingga 10.000',icon:'🔢',lessons:[
{id:'b1',title:'Membaca & Menulis Bilangan',content:'Bilangan terdiri dari ribuan, ratusan, puluhan, dan satuan. Contoh: 3.456 = 3 ribuan + 4 ratusan + 5 puluhan + 6 satuan.'},

// --- SOAL GENERATOR ---
function generateSoal(topic,count=5){
const soalList=[];
for(let i=0;i<count;i++){
let q,a,opts;
switch(topic){
case 'bilangan':{
const n=randInt(100,9999);
q=`Berapa nilai angka ${String(n)[0]} pada bilangan ${n.toLocaleString('id-ID')}?`;
const pos=String(n).length-1;
const vals=[1,10,100,1000];
a=parseInt(String(n)[0])*vals[pos];
opts=shuffle([a,a*10,a/10||1,randInt(1,9)*vals[pos]].map(Math.abs)).slice(0,4);
if(!opts.includes(a))opts[0]=a;
break;}
case 'penjumlahan':{
const x=randInt(10,999),y=randInt(10,999);a=x+y;
q=`${x} + ${y} = ...`;
opts=shuffle([a,a+randInt(1,10),a-randInt(1,10),a+randInt(11,20)]);break;}
case 'pengurangan':{
const x=randInt(100,999),y=randInt(10,x-1);a=x-y;
q=`${x} - ${y} = ...`;
opts=shuffle([a,a+randInt(1,10),a-randInt(1,10),a+randInt(11,20)]);break;}
case 'perkalian':{
const x=randInt(2,10),y=randInt(2,10);a=x*y;
q=`${x} × ${y} = ...`;
opts=shuffle([a,a+randInt(1,5),a-randInt(1,5),a+randInt(6,10)]);break;}
case 'pembagian':{
const y=randInt(2,9),x=y*randInt(2,10);a=x/y;
q=`${x} ÷ ${y} = ...`;
opts=shuffle([a,a+1,a-1,a+2]);break;}
default:{const x=randInt(1,100),y=randInt(1,100);a=x+y;q=`${x}+${y}=?`;opts=shuffle([a,a+1,a-1,a+2])}
}
opts=opts.filter(o=>o>=0);
if(opts.length<4)opts.push(a+3);
if(!opts.includes(a))opts[0]=a;
soalList.push({q,a,opts:[...new Set(opts)].slice(0,4)});
}
return soalList;
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=randInt(0,i);[a[i],a[j]]=[a[j],a[i]]}return a}

if(profile.progress&&Object.keys(profile.progress).length>0&&!earned.includes('first_lesson'))earned.push('first_lesson');
if(ex.length>=5&&!earned.includes('five_exercises'))earned.push('five_exercises');
if(qz.so
